<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Course Management</title>

    <link rel="stylesheet" href="style.css">
    <script type="module" src="js/main.js"></script>
</head>
<body>
    <h1>Student Course Managemnet</h1>

    <div class="controls">
    <input type="text" id="search-input" placeholder="Search by student name..." aria-label="Search students by name">

    <select id="course-filter" aria-label="Filter students by course">
        <option value="all">All Courses</option>
    </select>
    </div>

    <div id="statistics">

        <h2 style="text-align: center; font-size: 30px; margin-top: 0px;">Statistics</h2>
        
        <div id="stats">
        
        <div class="stat-card">
        <p>Total Students</p>
        <p class="stat-number"><span id="total-students">0</span></p>
        </div>
        
        <div class="stat-card">
        <p>Average Age:</p>
        <p class="stat-number"><span id="average-age">0</span></p>
        </div>

        </div>
        
        <div id="course-count"></div>

    </div>

    <div id="loading">
    Loading students...
    </div>

    <div id="error-message"></div>

    <div id="student-container"></div>

    <div id="modal">
        <div id="student-detail-container">
            <h2>Student Details</h2>
            <div id="student-detail"></div>
            <button id="close-modal">Close</button>
        </div>
    </div>

</body>
</html>
