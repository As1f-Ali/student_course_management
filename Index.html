<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Course Management</title>

    <link rel="stylesheet" href="style.css">
    <script type="module" src="js/main.js"></script>
</head>
<body>
    <h1>Student Course Managemnet</h1>

    <div class="controls">
    <input type="text" id="search-input" placeholder="Search by student name...">

    <select id="course-filter">
        <option value="all">All Courses</option>
    </select>
    </div>

    <div id="statistics">

        <h2>Statistics</h2>

        <p>Total Students: <span id="total-students">0</span></p>

        <p>Average Age: <span id="average-age">0</span></p>

        <div id="course-count"></div>

    </div>

    <div id="loading">
    Loading students...
    </div>

    <div id="error-message"></div>

    <div id="student-container"></div>

</body>
</html>
